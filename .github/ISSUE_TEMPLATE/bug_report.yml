name: Bug Report
description: Report a bug in arctl
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

        **Before submitting**, please check:
        - [ ] I've searched existing issues to make sure this isn't a duplicate
        - [ ] I've run the test suite (`python run_tests.py`) to confirm the issue

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: "When I call step() with high repetition metrics, I get..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        1. Create a SystemState with `SystemState.initial(0.0)`
        2. Call `step()` with...
        3. Expected: ...
        4. Actual: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or tracebacks if available.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Bug Category
      options:
        - Kernel / State Machine
        - Chronos / Temporal
        - Icarus / Stability
        - Resonance Engine
        - Verification (lexical, metrics, uncertainty)
        - Other
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.12.0"
    validations:
      required: true

  - type: input
    id: arctl-version
    attributes:
      label: arctl Version
      description: Output of `python -c "import arctl; print(arctl.__version__)"` or check VERSION file
      placeholder: "1.2.0"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (logs, config, environment).
